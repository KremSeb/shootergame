name: Build and Deploy
on:
  push:
    branches:
      - main # If your default branch is named something else, change this

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Build
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Deployment Directory
        run: |
          mkdir -p ./deploy
          cp ./target/wasm32-unknown-unknown/release/spaceshooter.wasm ./deploy/
          cp index.html ./deploy/
          python - <<'PY'
          import glob, re, pathlib
          lock = pathlib.Path("Cargo.lock").read_text()
          m = re.search(r'(?ms)^name = "macroquad"\\s*^version = "([^"]+)"', lock)
          if not m:
              raise SystemExit("macroquad not found in Cargo.lock")
          ver = m.group(1)
          patterns = [
              f"{pathlib.Path.home()}/.cargo/registry/src/**/macroquad-{ver}/js/mq_js_bundle.js",
          ]
          matches = []
          for pat in patterns:
              matches.extend(glob.glob(pat, recursive=True))
          if not matches:
              raise SystemExit(f"mq_js_bundle.js not found for macroquad {ver}")
          src = matches[0]
          print(f"Using mq_js_bundle.js from {src}")
          pathlib.Path("deploy/mq_js_bundle.js").write_bytes(pathlib.Path(src).read_bytes())
          PY

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
